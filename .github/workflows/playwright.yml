name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  ENV: prod
  NODE_OPTIONS: '--max_old_space_size=4096'

jobs:
  test:
    timeout-minutes: 90
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]   # ✅ FIXED (no slash)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test --shard=${{ matrix.shard }}/2   # ✅ FIXED

      - name: Install Allure commandline
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p allure-report
          allure generate allure-results --clean -o allure-report

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard }}   # ✅ SAFE
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright JSON result file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-json-${{ matrix.shard }}
          path: playwright-report/results.json
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results/
          retention-days: 30

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.shard }}
          path: allure-report/
          retention-days: 30