name: Playwright Tests with Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ENV: prod
  NODE_OPTIONS: '--max_old_space_size=4096'

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]   # ✅ parallel shards

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20   # ✅ updated

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (Shard ${{ matrix.shard }})
        run: npx playwright test --shard=${{ matrix.shard }}/4

      # ✅ Upload Allure results per shard
      - name: Upload Allure results (Shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: allure-results
          retention-days: 30

  # 🔥 MERGE JOB (MOST IMPORTANT)
  merge-allure-report:
    needs: playwright-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # ✅ Download all shard results
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: allure-results

      # ✅ Merge all results
      - name: Merge Allure results
        run: |
          mkdir merged-results
          find allure-results -type f -exec cp {} merged-results \;

      # ✅ Generate FINAL report
      - name: Generate final Allure report
        run: allure generate merged-results --clean -o allure-report

      # ✅ Upload FINAL report
      - name: Upload final Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-final
          path: allure-report
          retention-days: 30